<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마중 - 관리자</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex justify-center">
    <div id="login-section" class="w-full max-w-md min-h-screen bg-white p-10 flex flex-col justify-center">
        <h1 class="text-2xl font-bold mb-6">보호자 인증</h1>
        <input id="pin-input" type="password" placeholder="PIN 번호 4자리" class="border-b-2 border-blue-600 text-2xl py-2 mb-8 outline-none tracking-widest text-center">
        <button onclick="checkPin()" class="bg-blue-600 text-white py-4 rounded-2xl font-bold">로그인</button>
    </div>

    <div id="admin-section" class="hidden w-full max-w-md min-h-screen bg-white p-6">
        <h1 class="text-xl font-bold mb-8">보호자 관리 모드</h1>
        <div class="bg-gray-50 p-6 rounded-3xl border mb-6">
            <p class="text-sm text-gray-500 mb-2">현재 상태</p>
            <p id="current-status" class="text-2xl font-bold text-blue-600">정상</p>
        </div>
        <button id="toggle-btn" class="w-full py-5 rounded-2xl font-bold text-white mb-4"></button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { /* 본인의 Config 복사 */ };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const elderRef = doc(db, "elders", "elder01");

        // PIN 확인 함수 (간단하게 구현)
        window.checkPin = async () => {
            const input = document.getElementById('pin-input').value;
            const docSnap = await getDoc(elderRef);
            if (docSnap.data().pin === input) {
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('admin-section').classList.remove('hidden');
            } else {
                alert("PIN 번호가 틀렸습니다.");
            }
        };

        // 실시간 상태 업데이트 및 버튼 기능
        onSnapshot(elderRef, (doc) => {
            const isMissing = doc.data().isMissing;
            const statusText = document.getElementById('current-status');
            const btn = document.getElementById('toggle-btn');

            if (isMissing) {
                statusText.innerText = "실종 신고 중";
                statusText.className = "text-2xl font-bold text-red-600";
                btn.innerText = "실종 신고 해제하기";
                btn.className = "w-full py-5 rounded-2xl font-bold text-white bg-blue-600";
                btn.onclick = () => updateDoc(elderRef, { isMissing: false });
            } else {
                statusText.innerText = "정상";
                statusText.className = "text-2xl font-bold text-blue-600";
                btn.innerText = "실종 신고 등록하기";
                btn.className = "w-full py-5 rounded-2xl font-bold text-white bg-red-600";
                btn.onclick = () => updateDoc(elderRef, { isMissing: true });
            }
        });
    </script>
</body>
</html>
